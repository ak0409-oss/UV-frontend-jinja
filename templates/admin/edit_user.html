{% extends "base.html" %}
{% block title %}Edit User{% endblock %}
{% block content %}

<h2 class="text-2xl font-bold mb-6">Edit User: {{ user.name }}</h2>

<div class="max-w-lg border rounded-xl p-6 bg-white shadow-sm">
  <form method="POST" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Name</label>
      <input type="text" name="name" value="{{ user.name }}" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Email</label>
      <input type="email" name="email" value="{{ user.email }}" required
             class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-slate-400"/>
    </div>
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Assigned Hostel</label>
      <select name="hostelId" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none">
        <option value="">-- None --</option>
        {% for h in hostels %}
        <option value="{{ h.id }}" {% if h.id == user.get('hostelId') %}selected{% endif %}>{{ h.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% if user.role == 'student' %}
    <div>
      <label class="block text-sm font-medium text-slate-700 mb-1">Assigned Mentor</label>
      <select name="mentorId" class="w-full border rounded-lg px-3 py-2 text-sm focus:outline-none">
        <option value="">-- None --</option>
        {% for m in mentors %}
        <option value="{{ m.id }}" {% if m.id == user.get('mentorId') %}selected{% endif %}>{{ m.name }}</option>
        {% endfor %}
      </select>
    </div>
    {% endif %}
    <div class="flex gap-3 pt-2">
      <button type="submit"
              class="bg-slate-800 hover:bg-slate-700 text-white px-5 py-2 rounded-lg text-sm transition">
        Save Changes
      </button>
      <a href="/admin"
         class="border border-slate-400 hover:bg-slate-100 px-5 py-2 rounded-lg text-sm transition">
        Cancel
      </a>
    </div>
  </form>
</div>

{% endblock %}
